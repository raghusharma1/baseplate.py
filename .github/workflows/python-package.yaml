name: Lint and Test

on:
  push:
    branches: [ develop, v2.5, v2.5-unsupported-gcp ]
  pull_request:
    branches: [ develop, v2.5, v2.5-unsupported-gcp ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    container:
      image: python:${{ matrix.python-version }}

    services:
      cassandra:
        image: "cassandra:3.11"
      memcached:
        image: "memcached:1.5.6"
      redis:
        image: "redis:4.0.9"
      zookeeper:
        image: "zookeeper:3.4.10"

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: ~/.cache/pypoetry
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      # TODO(ckuehl|2024-09-26): Remove this once Python 3.13 wheels are
      # available for our dependencies.
      - name: Install temporary Python 3.13 build dependencies
        if: ${{ matrix.python-version == '3.13' }}
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Update PATH
        run: 'echo "$HOME/.local/bin" >> "$GITHUB_PATH"'

      - name: Install dependencies
        env:
          CASS_DRIVER_NO_EXTENSIONS: theytaketoolongtobuild
        run: |
          pip install pipx
          pipx install poetry==1.8.3
          make .venv

      - name: Lint
        run: |
          make lint

      - name: Test
        run: |
          make test
